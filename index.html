<meta charset="utf-8"> <!-- 없으면 한글이 깨진다 -->
<style>
  #tc-table { border-collapse: collapse; }
  #tc-table th, #tc-table td { border: 1px solid #ccc; padding: 4px 8px; }
</style>

<!-- 기능 2+3: 기획서(ppt) → AI → 테스트케이스(excel) -->
<input type="file" id="ppt-input" accept=".pptx">
<button id="export-btn">엑셀로 내보내기</button>
<p id="status"></p>
<table id="tc-table"></table>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script type="module" src="main.js"></script>
